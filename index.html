<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste DISC — V4 Company</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v4-red:     #e50914;
      --v4-red-dk:  #b20710;
      --v4-bg:      #0d0d0d;
      --v4-surface: #141414;
      --v4-surf2:   #1a1a1a;
      --v4-border:  #2a2a2a;
      --v4-glow:    rgba(229,9,20,0.15);
      --v4-text:    #ffffff;
      --v4-muted:   #b3b3b3;
      --c-d: #e50914;
      --c-i: #ffc02a;
      --c-s: #52cc5a;
      --c-c: #4a9ee8;
      --r: 8px;
    }

    body {
      font-family: 'Montserrat', -apple-system, sans-serif;
      background: var(--v4-bg);
      color: var(--v4-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    #app { width: 100%; max-width: 680px; padding: 8px 0 48px; }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }
    .logo-img { height: 28px; width: auto; display: block; }
    .logo-name { font-weight: 700; font-size: 14px; letter-spacing: 0.3px; }
    .logo-name span { color: var(--v4-muted); font-weight: 400; }

    /* ── Typography ── */
    .title-xl {
      font-family: 'Bebas Neue', 'Montserrat', sans-serif;
      font-size: clamp(48px, 9vw, 80px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .title-xl em { color: var(--v4-red); font-style: normal; }
    .subtitle {
      color: var(--v4-muted);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 400;
      margin-bottom: 36px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--v4-muted);
      margin-bottom: 8px;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }
    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--v4-muted);
    }
    .field input {
      background: var(--v4-surface);
      border: 1px solid var(--v4-border);
      border-radius: var(--r);
      color: var(--v4-text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--v4-red); }
    .field input::placeholder { color: #555; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 28px;
      border-radius: var(--r);
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      width: 100%;
    }
    .btn-primary { background: var(--v4-red); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--v4-red-dk); }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      color: var(--v4-muted);
      border: 1px solid var(--v4-border);
      margin-top: 10px;
    }
    .btn-outline:hover { border-color: #555; color: var(--v4-text); }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 30px; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--v4-muted); margin-bottom: 8px;
    }
    .progress-track {
      height: 3px; background: var(--v4-border);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--v4-red);
      border-radius: 2px; transition: width 0.4s ease;
    }

    /* ── Question ── */
    .q-text {
      font-size: clamp(15px, 2.2vw, 19px);
      font-weight: 600; line-height: 1.55;
      margin-bottom: 8px;
    }
    .q-hint {
      font-size: 13px; color: var(--v4-muted);
      margin-bottom: 20px; font-weight: 400;
    }

    /* ── Alternatives ── */
    .alts { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

    .alt {
      display: flex; align-items: center; gap: 12px;
      background: var(--v4-surface);
      border: 1.5px solid var(--v4-border);
      border-radius: var(--r);
      padding: 13px 12px;
      cursor: grab;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      position: relative;
    }
    .alt:active { cursor: grabbing; }
    .alt.dragging { opacity: 0.35; }
    .alt.drop-above::before {
      content: '';
      position: absolute;
      top: -6px; left: 0; right: 0;
      height: 2px;
      background: var(--v4-red);
      border-radius: 2px;
      box-shadow: 0 0 6px var(--v4-red);
    }

    .rank {
      min-width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      flex-shrink: 0;
    }
    .rank-1 { background: var(--v4-surf2); color: var(--v4-text); border: 1.5px solid #555; }
    .rank-2 { background: var(--v4-surf2); color: var(--v4-muted); border: 1.5px solid var(--v4-border); }
    .rank-3 { background: var(--v4-surf2); color: var(--v4-muted); border: 1.5px solid var(--v4-border); }
    .rank-4 { background: var(--v4-surf2); color: var(--v4-muted); border: 1.5px solid var(--v4-border); }

    .alt-txt { font-size: 13.5px; line-height: 1.5; flex: 1; font-weight: 400; }

    .alt-arrows { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .arr-btn {
      background: var(--v4-surf2); border: 1px solid var(--v4-border);
      border-radius: 4px; color: var(--v4-muted);
      cursor: pointer; font-size: 11px;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .arr-btn:hover:not(:disabled) { background: var(--v4-border); color: var(--v4-text); }
    .arr-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Result ── */
    .result-hero {
      text-align: center;
      padding: 32px 0 24px;
    }
    .profile-initial {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800;
      margin: 0 auto 16px;
    }
    .result-profile-name {
      font-family: 'Bebas Neue', 'Montserrat', sans-serif;
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 400;
      letter-spacing: 3px;
      line-height: 1.05;
      margin-bottom: 4px;
    }
    .result-nick { font-size: 15px; color: var(--v4-muted); font-weight: 500; margin-bottom: 12px; }
    .result-phrase { font-size: 16px; font-weight: 600; font-style: italic; line-height: 1.4; }

    .elem-badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      margin: 16px 0 24px;
    }

    /* Chart */
    .chart {
      background: var(--v4-surface);
      border: 1px solid rgba(229,9,20,0.25);
      border-radius: var(--r);
      padding: 20px; margin-bottom: 20px;
      box-shadow: 0 0 24px var(--v4-glow);
    }
    .chart-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--v4-muted); margin-bottom: 16px; }
    .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .chart-row:last-child { margin-bottom: 0; }
    .chart-lbl { font-size: 13px; font-weight: 800; width: 20px; flex-shrink: 0; }
    .chart-bg { flex: 1; height: 26px; background: var(--v4-surf2); border-radius: 4px; overflow: hidden; }
    .chart-bar {
      height: 100%; border-radius: 4px;
      display: flex; align-items: center;
      padding-left: 10px;
      font-size: 12px; font-weight: 700; color: #fff;
      min-width: 38px;
      transition: width 1s cubic-bezier(0.22,1,0.36,1);
    }

    /* Profile detail card */
    .detail-card {
      background: var(--v4-surface);
      border: 1px solid rgba(229,9,20,0.25);
      border-radius: var(--r);
      padding: 22px; margin-bottom: 16px;
      box-shadow: 0 0 24px var(--v4-glow);
    }
    .detail-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--v4-muted); margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-item-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--v4-muted); }
    .detail-item-val { font-size: 14px; font-weight: 500; line-height: 1.45; }

    /* Secondary badge */
    .sec-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--v4-surface);
      border: 1px solid var(--v4-border);
      border-radius: 20px; padding: 8px 16px;
      font-size: 14px; font-weight: 600;
      margin-bottom: 20px;
    }
    .sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .divider { height: 1px; background: var(--v4-border); margin: 22px 0; }

    /* Sending overlay */
    .sending-msg {
      text-align: center; padding: 12px 0 20px;
      font-size: 13px; color: var(--v4-muted);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease both; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333; border-top-color: var(--v4-muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }
  </style>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
<div id="app"></div>
<script>
/* ─── CONFIG ─────────────────────────────────── */

/* ─── DATA ───────────────────────────────────── */

/* ─── STORAGE ────────────────────────────────── */
const LS_KEY = 'disc_v4_state';

function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && saved.screen) {
        S = saved;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function clearState() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

/* ─── HELPERS ────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initShuffled() {
  S.shuffled = QUESTIONS.map(() => shuffle(['D','I','S','C']));
}

function rankingToAnswer(ranking) {
  const pts = { D: 0, I: 0, S: 0, C: 0 };
  ranking.forEach((key, idx) => { pts[key] = 4 - idx; });
  return pts;
}

function calcScores() {
  const total = { D: 0, I: 0, S: 0, C: 0 };
  S.answers.forEach(ans => {
    ['D','I','S','C'].forEach(k => { total[k] += ans[k] || 0; });
  });
  return total;
}

function getDominant(scores) {
  return Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
}

function getSecondary(scores) {
  return Object.entries(scores).sort((a,b) => b[1]-a[1])[1][0];
}

function render() {
  if (S.screen === 'welcome') renderWelcome();
  else if (S.screen === 'question') renderQuestion();
  else if (S.screen === 'result') renderResult();
}

/* ── Welcome ── */
function renderWelcome() {
  app.innerHTML = `
    ${header()}
    <div class="fade-up">
      <h1 class="title-xl">Descubra seu<br>perfil <em>DISC</em></h1>
      <p class="subtitle">
        20 perguntas. Ordene as alternativas do mais ao menos parecido com você.<br>
        Sem respostas certas ou erradas — seja honesto(a).
      </p>
      <div class="form-grid">
        <div class="field">
          <label>Nome completo</label>
          <input id="f-name" type="text" placeholder="Seu nome" value="${esc(S.user.name)}">
        </div>
        <div class="field">
          <label>E-mail</label>
          <input id="f-email" type="email" placeholder="seu@email.com" value="${esc(S.user.email)}">
        </div>
        <div class="field">
          <label>Empresa</label>
          <input id="f-empresa" type="text" placeholder="Nome da empresa" value="${esc(S.user.empresa)}">
        </div>
        <div class="field">
          <label>Função / Cargo</label>
          <input id="f-funcao" type="text" placeholder="Seu cargo" value="${esc(S.user.funcao)}">
        </div>
      </div>
      <button class="btn btn-primary" id="btn-start" disabled>Iniciar teste →</button>
    </div>`;

  const fields = ['f-name','f-email','f-empresa','f-funcao'];
  const btn = document.getElementById('btn-start');

  function checkFields() {
    const ok = fields.every(id => document.getElementById(id).value.trim() !== '');
    btn.disabled = !ok;
  }

  fields.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', checkFields);
  });

  checkFields();

  btn.addEventListener('click', () => {
    S.user.name    = document.getElementById('f-name').value.trim();
    S.user.email   = document.getElementById('f-email').value.trim();
    S.user.empresa = document.getElementById('f-empresa').value.trim();
    S.user.funcao  = document.getElementById('f-funcao').value.trim();
    S.screen = 'question';
    S.currentQ = 0;
    S.answers = [];
    initShuffled();
    S.ranking = [...S.shuffled[0]];
    saveState();
    render();
  });
}

/* ── Question ── */
function renderQuestion() {
  const q = QUESTIONS[S.currentQ];
  const n = S.currentQ;
  const total = QUESTIONS.length;
  const pct = Math.round((n / total) * 100);

  app.innerHTML = `
    ${header()}
    <div class="fade-up">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>Pergunta ${n + 1} de ${total}</span>
          <span>${pct}% concluído</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <p class="q-text">${esc(q.text)}</p>
      <p class="q-hint">Arraste ou use ↑↓ para ordenar do mais ao menos parecido com você</p>

      <ul class="alts" id="alts-list">
        ${S.ranking.map((key, idx) => altItem(key, idx, q.alts[key])).join('')}
      </ul>

      <button class="btn btn-primary" id="btn-next">
        ${n < total - 1 ? 'Próxima →' : 'Ver resultado →'}
      </button>
    </div>`;

  bindAltEvents();

  document.getElementById('btn-next').addEventListener('click', () => {
    S.answers[S.currentQ] = rankingToAnswer(S.ranking);
    if (S.currentQ < QUESTIONS.length - 1) {
      S.currentQ++;
      S.ranking = [...S.shuffled[S.currentQ]];
    } else {
      S.screen = 'result';
    }
    saveState();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function altItem(key, idx, text) {
  const rank = idx + 1;
  return `
    <li class="alt" draggable="true" data-idx="${idx}" data-key="${key}">
      <div class="rank rank-${rank}">${rank}º</div>
      <span class="alt-txt">${esc(text)}</span>
      <div class="alt-arrows">
        <button class="arr-btn" data-dir="up" data-idx="${idx}" ${idx === 0 ? 'disabled' : ''}>▲</button>
        <button class="arr-btn" data-dir="down" data-idx="${idx}" ${idx === 3 ? 'disabled' : ''}>▼</button>
      </div>
    </li>`;
}

function bindAltEvents() {
  const list = document.getElementById('alts-list');
  if (!list) return;

  /* Arrow buttons */
  list.addEventListener('click', e => {
    const btn = e.target.closest('.arr-btn');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx);
    const dir = btn.dataset.dir;
    const swap = dir === 'up' ? idx - 1 : idx + 1;
    if (swap < 0 || swap > 3) return;
    [S.ranking[idx], S.ranking[swap]] = [S.ranking[swap], S.ranking[idx]];
    saveState();
    const q = QUESTIONS[S.currentQ];
    list.innerHTML = S.ranking.map((k, i) => altItem(k, i, q.alts[k])).join('');
    bindAltEvents();
  });

  /* Drag and drop (desktop) */
  list.querySelectorAll('.alt').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = parseInt(item.dataset.idx);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      list.querySelectorAll('.alt').forEach(i => i.classList.remove('drop-above'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.alt').forEach(i => i.classList.remove('drop-above'));
      item.classList.add('drop-above');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const tgt = parseInt(item.dataset.idx);
      if (dragSrc !== null && dragSrc !== tgt) {
        const r = [...S.ranking];
        const [moved] = r.splice(dragSrc, 1);
        r.splice(tgt, 0, moved);
        S.ranking = r;
        saveState();
        const q = QUESTIONS[S.currentQ];
        list.innerHTML = S.ranking.map((k, i) => altItem(k, i, q.alts[k])).join('');
        bindAltEvents();
      }
      dragSrc = null;
    });
  });
}

/* ── Result ── */

  const dom = getDominant(scores);

  const P = PROFILES[dom];

  app.innerHTML = `

        </div>

        <div class="elem-badge" style="background:${P.colorHex}20; color:${P.colorHex}; border:1px solid ${P.colorHex}40">
          ${P.element}
        </div>
      </div>

      <p class="section-label">Perfil secundário</p>
      <div class="sec-badge">
        <span class="sec-dot" style="background:${PROFILES[sec].colorHex}"></span>

      </div>

      <div class="chart">
        <p class="chart-title">Pontuação por perfil</p>
        ${['D','I','S','C'].map(k => {
          const pct = Math.round((scores[k] / maxPts) * 100);
          const w = Math.max(pct, 8);
          return `
          <div class="chart-row">
            <span class="chart-lbl" style="color:${PROFILES[k].colorHex}">${k}</span>
            <div class="chart-bg">
              <div class="chart-bar" style="width:${w}%; background:${PROFILES[k].colorHex}">
                ${scores[k]}pts
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="detail-card">
        <p class="detail-card-title" style="color:${P.colorHex}">● Perfil dominante — ${P.name} (${P.nick})</p>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-item-lbl">Motivações</span>
            <span class="detail-item-val">${P.motivations}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Necessidade básica</span>
            <span class="detail-item-val">${P.need}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Forças</span>
            <span class="detail-item-val">${P.strengths}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Pontos de atenção</span>
            <span class="detail-item-val">${P.weaknesses}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Sob pressão</span>
            <span class="detail-item-val">${P.pressure}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Caráter / Medo</span>
            <span class="detail-item-val">${P.character} · ${P.fear}</span>
          </div>
        </div>
      </div>

      <div class="detail-card">
        <p class="detail-card-title" style="color:${PS.colorHex}">● Perfil secundário — ${PS.name} (${PS.nick})</p>
        <p class="result-phrase" style="margin-bottom:16px; font-size:14px; color:var(--v4-muted)">${PS.phrase}</p>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-item-lbl">Motivações</span>
            <span class="detail-item-val">${PS.motivations}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Necessidade básica</span>
            <span class="detail-item-val">${PS.need}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Forças</span>
            <span class="detail-item-val">${PS.strengths}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Pontos de atenção</span>
            <span class="detail-item-val">${PS.weaknesses}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Sob pressão</span>
            <span class="detail-item-val">${PS.pressure}</span>
          </div>
          <div class="detail-item">
            <span class="detail-item-lbl">Caráter / Medo</span>
            <span class="detail-item-val">${PS.character} · ${PS.fear}</span>
          </div>
        </div>
      </div>

      ${(() => {
        const combo = COMBINATIONS[`${dom}+${sec}`];
        if (!combo) return '';
        return `
        <div class="detail-card" style="border-color: #444">
          <p class="detail-card-title">🔗 Combinação ${dom}+${sec} — ${combo.title}</p>
          <p style="font-size:14px; line-height:1.7; color:var(--v4-muted); font-weight:400">${combo.text}</p>
        </div>`;
      })()}

      <div class="divider"></div>
      <p id="send-status" class="sending-msg"><span class="spinner"></span> Salvando seu resultado…</p>
      <button class="btn btn-outline" id="btn-restart">↺ Refazer o teste</button>
    </div>`;

  document.getElementById('btn-restart').addEventListener('click', () => {
    clearState();
    S = {
      screen: 'welcome',
      user: { name: S.user.name, email: S.user.email, empresa: S.user.empresa, funcao: S.user.funcao },
      currentQ: 0,
      shuffled: [],
      ranking: [],
      answers: []
    };
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

/* ─── GOOGLE SHEETS ──────────────────────────── */
async function sendToSheets(scores, dom, sec) {
  const payload = {
    timestamp: new Date().toISOString(),
    nome:      S.user.name,
    email:     S.user.email,
    empresa:   S.user.empresa,
    funcao:    S.user.funcao,
    scoreD:    scores.D,
    scoreI:    scores.I,
    scoreS:    scores.S,
    scoreC:    scores.C,
    dominante:  PROFILES[dom].name,
    secundario: PROFILES[sec].name,
    answers:   S.answers
  };

  const statusEl = () => document.getElementById('send-status');

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    if (statusEl()) statusEl().textContent = '✓ Resultado salvo com sucesso.';
  } catch(e) {
    if (statusEl()) statusEl().textContent = '⚠ Não foi possível salvar. Verifique a URL do Apps Script.';
  }
}

/* ─── UTILS ──────────────────────────────────── */
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ─── INIT ───────────────────────────────────── */
function init() {
  const resumed = loadState();
  if (resumed && S.screen === 'question' && S.answers.length === QUESTIONS.length) {
    S.screen = 'result';
  }
  render();
}

init();
</script>
